<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결로아 모공 진단 · 나에게 맞는 토너 찾기</title>
<style>
  :root { --bg:#0f1115; --card:#191c23; --line:#2a2e37; --fg:#f2f4f8; --sub:#9aa3b2; --accent:#7de3c3; --accent2:#5b8cff; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--fg); font-family:-apple-system,"Apple SD Gothic Neo","Pretendard",sans-serif; display:flex; justify-content:center; }
  .app { width:100%; max-width:375px; min-height:100vh; padding:24px 20px 40px; }
  .eyebrow { color:var(--accent); font-size:12px; letter-spacing:1px; font-weight:700; }
  h1 { font-size:22px; margin:6px 0 4px; line-height:1.3; }
  .sub { color:var(--sub); font-size:13px; margin-bottom:20px; }
  .bar { height:5px; background:var(--line); border-radius:3px; overflow:hidden; margin-bottom:22px; }
  .fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .3s; }
  .q { font-size:16px; font-weight:600; margin-bottom:16px; }
  .opt { display:block; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px; font-size:14px; cursor:pointer; transition:.15s; }
  .opt:hover { border-color:var(--accent); }
  .opt:active { transform:scale(.98); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:24px 20px; text-align:center; }
  .pill { display:inline-block; background:rgba(125,227,195,.15); color:var(--accent); font-size:12px; font-weight:700; padding:5px 12px; border-radius:999px; margin-bottom:14px; }
  .prod { font-size:20px; font-weight:800; margin-bottom:8px; }
  .copy { color:var(--sub); font-size:14px; line-height:1.6; margin-bottom:20px; }
  .cta { display:block; width:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); color:#0b0d10; border:0; border-radius:12px; padding:14px; font-size:15px; font-weight:800; cursor:pointer; }
  .again { background:none; border:0; color:var(--sub); font-size:13px; margin-top:16px; cursor:pointer; text-decoration:underline; }
  .hidden { display:none; }
</style>
</head>
<body>
<div class="app">
  <div class="eyebrow">KELLOA · 신학기 모공 진단</div>
  <h1>3문항으로 찾는<br>내 토너</h1>
  <p class="sub">1분이면 끝나요. 결과에 맞는 결로아 토너를 추천해 드려요.</p>
  <div class="bar"><div class="fill" id="fill" style="width:33%"></div></div>

  <div id="quiz"></div>

  <div id="result" class="card hidden">
    <span class="pill">진단 완료</span>
    <div class="prod" id="prod"></div>
    <p class="copy" id="copy"></p>
    <button class="cta">이 토너로 21일 챌린지 시작 →</button>
    <button class="again" onclick="reset()">다시 진단하기</button>
  </div>
</div>

<script>
  const QS = [
    { q:"세안 후 몇 시간 뒤 번들거리나요?", opts:[["바로 번들거려요","pore"],["3~4시간 뒤","pore"],["거의 안 남아요","water"]] },
    { q:"가장 신경 쓰이는 부위는?", opts:[["T존·볼 모공","pore"],["부분적으로 조금","water"],["딱히 없어요","calm"]] },
    { q:"자극이나 붉어짐이 있나요?", opts:[["자주 있어요","calm"],["가끔요","calm"],["없어요","water"]] }
  ];
  const REC = {
    pore:  { prod:"포어 토너 V2", copy:"T존까지 조이는 모공 집중 케어. 번들거림과 넓어진 모공을 매일 정돈해요." },
    water: { prod:"워터 토너",    copy:"속당김 없이 수분 결을 채우는 데일리 토너. 가볍게 스며드는 촉촉함." },
    calm:  { prod:"카밍 토너",    copy:"자극 없이 진정부터. 붉어짐이 잦은 민감 피부를 위한 저자극 포뮬러." }
  };
  let step = 0; const tally = { pore:0, water:0, calm:0 };

  function render() {
    document.getElementById("fill").style.width = ((step+1)/QS.length*100) + "%";
    const cur = QS[step];
    document.getElementById("quiz").innerHTML =
      '<div class="q">Q' + (step+1) + '. ' + cur.q + '</div>' +
      cur.opts.map((o,i) => '<button class="opt" onclick="pick(\'' + o[1] + '\')">' + o[0] + '</button>').join("");
  }
  function pick(type) {
    tally[type]++; step++;
    if (step < QS.length) { render(); }
    else { show(); }
  }
  function show() {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("fill").style.width = "100%";
    const best = Object.keys(tally).reduce((a,b) => tally[a] >= tally[b] ? a : b);
    document.getElementById("prod").textContent = REC[best].prod;
    document.getElementById("copy").textContent = REC[best].copy;
    document.getElementById("result").classList.remove("hidden");
  }
  function reset() {
    step = 0; tally.pore = tally.water = tally.calm = 0;
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    render();
  }
  render();
</script>
</body>
</html>
